<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f5f5f8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Aimashi">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Aimashi Web</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="./apple-touch-icon.png">
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell" data-auth="loading">
      <section id="loginView" class="login-view" aria-label="登录 Aimashi">
        <div class="login-panel">
          <div class="login-brand">
            <div class="brand-mark">A</div>
            <div>
              <h1>Aimashi</h1>
              <p>登录后在网页端、桌面端和手机端同步聊天。</p>
            </div>
          </div>
          <form id="loginForm" class="login-form">
            <label>
              用户名
              <input id="usernameInput" type="text" autocomplete="username" required>
            </label>
            <label>
              密码
              <div class="code-row">
                <input id="passwordInput" type="password" autocomplete="current-password" placeholder="至少 6 位" required>
                <button id="registerButton" type="submit">创建账号</button>
              </div>
            </label>
            <button class="primary-action" type="submit">登录 Aimashi Web</button>
            <p id="loginHint" class="login-hint">账号、会话和图片会保存到 Aimashi Cloud 服务器。</p>
          </form>
        </div>
      </section>

      <section id="mainView" class="main-view" aria-label="Aimashi Web">
        <aside class="nav-rail" aria-label="主导航">
          <div class="rail-logo">A</div>
          <button class="rail-button active" type="button" data-view="chat" title="消息" aria-label="消息">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <em id="unreadCount" hidden>0</em>
          </button>
          <div class="rail-spacer"></div>
          <button id="openSettings" class="rail-button" type="button" title="设置" aria-label="设置">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16 M4 12h16 M4 18h16"/></svg>
          </button>
        </aside>

        <aside class="sidebar">
          <header class="sidebar-tools">
            <label class="search-box">
              <span>⌕</span>
              <input id="conversationSearch" autocomplete="off" placeholder="搜索">
            </label>
            <button id="newConversation" class="icon-button" type="button" title="新建" aria-label="新建">＋</button>
            <div id="conversationCreateMenu" class="create-menu hidden">
              <button id="convMenuAddFriend" type="button">
                <span class="create-menu-icon" aria-hidden="true">
                  <svg viewBox="0 0 48 48" fill="none" focusable="false">
                    <circle cx="24" cy="24" r="6" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M30 18V26C30 28.2091 31.7909 30 34 30C36.2091 30 38 28.2091 38 26V24C38 16.268 31.732 10 24 10C16.268 10 10 16.268 10 24C10 31.732 16.268 38 24 38" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </span>
                <span class="create-menu-label">添加好友</span>
              </button>
              <button id="convMenuNewGroup" type="button">
                <span class="create-menu-icon" aria-hidden="true">
                  <svg viewBox="0 0 48 48" fill="none" focusable="false">
                    <path d="M19 20C22.866 20 26 16.866 26 13C26 9.13401 22.866 6 19 6C15.134 6 12 9.13401 12 13C12 16.866 15.134 20 19 20Z" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M32.6077 7C34.6405 8.2249 36.0001 10.4537 36.0001 13C36.0001 15.5463 34.6405 17.7751 32.6077 19" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M4 40.8V42H34V40.8C34 36.3196 34 34.0794 33.1281 32.3681C32.3611 30.8628 31.1372 29.6389 29.6319 28.8719C27.9206 28 25.6804 28 21.2 28H16.8C12.3196 28 10.0794 28 8.36808 28.8719C6.86278 29.6389 5.63893 30.8628 4.87195 32.3681C4 34.0794 4 36.3196 4 40.8Z" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M43.9999 42.0001V40.8001C43.9999 36.3197 43.9999 34.0795 43.128 32.3682C42.361 30.8629 41.1371 29.6391 39.6318 28.8721" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </span>
                <span class="create-menu-label">发起群聊</span>
              </button>
            </div>
          </header>
          <section id="conversationList" class="persona-list" aria-label="会话列表"></section>
        </aside>

        <section class="workspace">
          <header class="topbar">
            <button id="mobileBack" class="narrow-back-button" type="button" aria-label="返回消息列表">‹</button>
            <div class="group-title">
              <span id="activeAvatar" class="avatar"></span>
              <div>
                <h1 id="activeTitle">Aimashi</h1>
                <p id="activeMeta">Aimashi Cloud · 已同步</p>
              </div>
            </div>
            <div class="top-actions">
              <span id="statusText" class="model-switch-status">Aimashi Cloud</span>
            </div>
          </header>

          <section class="chat-layout">
            <div id="chat" class="chat" aria-live="polite"></div>
            <form id="chatForm" class="composer">
              <div class="composer-input-row">
                <textarea id="chatInput" placeholder="输入消息，Enter 发送，Shift+Enter 换行"></textarea>
                <button id="sendButton" class="send-button" type="submit" title="发送" aria-label="发送">↗</button>
              </div>
            </form>
          </section>
        </section>
      </section>

      <section id="settingsView" class="settings-modal hidden" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
        <div class="settings-dialog">
          <button id="closeSettings" class="icon-button settings-close-button" type="button" title="关闭" aria-label="关闭设置">×</button>
          <section class="settings-layout">
            <aside class="settings-tabs">
              <button class="settings-tab active" type="button" data-settings-tab="account">账号与同步</button>
              <button class="settings-tab" type="button" data-settings-tab="appearance">外观</button>
            </aside>
            <div class="settings-content">
              <h2 id="settingsTitle" class="visually-hidden">设置</h2>
              <section class="settings-panel" data-settings-panel="account">
                <div class="runtime-card mobile-pairing-card">
                  <section class="connection-row">
                    <div class="connection-row-head">
                      <div>
                        <strong>Aimashi Cloud</strong>
                        <p id="cloudAccountHint">当前登录的账号，会和桌面端共享消息。</p>
                      </div>
                      <div class="cloud-actions">
                        <button id="cloudLogoutFromSettings" class="secondary" type="button">退出登录</button>
                      </div>
                    </div>
                    <section id="cloudAccountInfo" class="connection-details">
                      <p id="cloudAccountUsername" class="pairing-hint">—</p>
                    </section>
                  </section>
                </div>
              </section>
              <section class="settings-panel hidden" data-settings-panel="appearance">
                <form id="appearanceForm" class="form-grid">
                  <section class="settings-row settings-group-start settings-group-end">
                    <div>
                      <strong>界面主题</strong>
                      <p>切换浅色或深色界面。</p>
                    </div>
                    <select id="appearanceTheme">
                      <option value="light">浅色</option>
                      <option value="dark">深色</option>
                    </select>
                  </section>
                </form>
              </section>
            </div>
          </section>
        </div>
      </section>

      <div id="toast" class="toast hidden" role="status"></div>
    </main>
    <script src="./app.js?v=20260522-web-avatars"></script>
  </body>
</html>
